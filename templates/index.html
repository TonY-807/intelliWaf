<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliWAF | Intelligent Firewall</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0b0e14; color: #fff; margin: 0; display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center;}
        .container { max-width: 800px; padding: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(45deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #a0aec0; font-size: 1.2rem; margin-bottom: 30px; }
        .test-box { margin-top: 40px; padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        input { padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; width: 70%; margin-bottom: 20px; font-size: 1rem; }
        .btn { padding: 12px 30px; border-radius: 12px; border: none; background: #4facfe; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; margin: 5px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4); }
        .btn-outline { background: transparent; border: 1px solid #4facfe; color: #4facfe; }
        .footer { margin-top: 50px; color: #4a5568; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>IntelliWAF</h1>
        <p>Advanced Real-time HTTP Traffic Filtering & Machine Learning Anomaly Detection</p>
        
        <div class="test-box">
            <h3>🛡️ Test the Firewall</h3>
            <p>Try sending some suspicious queries below:</p>
            <input type="text" id="queryInput" placeholder="Try: ' OR 1=1 -- or <script>alert(1)</script>"> <br>
            <button class="btn" onclick="testAttack()">Send Request</button>
            <button class="btn btn-outline" onclick="window.location.href='/login'">Go to Admin Dashboard</button>
        </div>
        
        <div id="result" style="margin-top: 20px; padding: 15px; border-radius: 10px; display: none;"></div>
    </div>

    <div class="footer">
        IntelliWAF &copy; 2026 - Cybersecurity Intelligence System
    </div>

    <script>
        async function testAttack() {
            const query = document.getElementById('queryInput').value;
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (response.status === 200) {
                    resultDiv.style.background = 'rgba(72, 187, 120, 0.2)';
                    resultDiv.style.color = '#48bb78';
                    resultDiv.innerHTML = `✅ <strong>Success:</strong> Request allowed. ${data.message}`;
                } else if (response.status === 403) {
                    resultDiv.style.background = 'rgba(245, 101, 101, 0.2)';
                    resultDiv.style.color = '#f56565';
                    resultDiv.innerHTML = `🚫 <strong>Blocked:</strong> ${data.description || "Malicious request detected."}`;
                }
                resultDiv.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                resultDiv.style.background = 'rgba(245, 101, 101, 0.2)';
                resultDiv.style.color = '#f56565';
                resultDiv.innerHTML = '🚫 <strong>Blocked:</strong> Attack detected and dropped by IntelliWAF.';
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
