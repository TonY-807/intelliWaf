<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliWAF | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0b0e14; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 400px; padding: 50px; background: #1e293b; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 2rem; font-weight: 700; margin-bottom: 40px; background: linear-gradient(45deg, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        form { display: flex; flex-direction: column; gap: 20px; }
        .input-group { text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; }
        .btn { padding: 14px; border-radius: 12px; border: none; background: #4facfe; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { background: #00f2fe; }
        .flash { color: #ef4444; font-size: 0.9rem; margin-top: 15px; }
        .back { margin-top: 25px; display: block; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">IntelliWAF</div>
        <form action="/login" method="POST">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button class="btn" type="submit">Sign In</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <a href="/" class="back">← Back to Test Center</a>
    </div>
</body>
</html>
